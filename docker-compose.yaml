services:
  ollama:
    volumes:
      - ollama:/root/.ollama
    container_name: ollama
    pull_policy: always
    tty: true
    restart: unless-stopped
    image: ollama/ollama:${OLLAMA_DOCKER_TAG-latest}
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - USE_CUDA=true
      - gpus=all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  open-webui:
    build:
      context: .
      args:
        OLLAMA_BASE_URL: '/ollama'
      dockerfile: Dockerfile
    image: ghcr.io/open-webui/open-webui:${WEBUI_DOCKER_TAG-main}
    container_name: open-webui
    volumes:
      - open-webui:/app/backend/data
    depends_on:
      - ollama
    ports:
      - ${OPEN_WEBUI_PORT-3000}:8080
    environment:
      - 'OLLAMA_BASE_URL=http://ollama:11434'
      - 'WEBUI_SECRET_KEY='
    extra_hosts:
      - host.docker.internal:host-gateway
    restart: unless-stopped

  pipelines:
    container_name: pipelines
    image: ghcr.io/open-webui/pipelines:main
    build:
      context: ./pipelines
      dockerfile: Dockerfile  # Include Dockerfile for building with necessary dependencies
    volumes:
      - ./pipelines:/app/pipelines  # Bind your local pipelines folder to the container
    ports:
      - "9099:9099"
    extra_hosts:
      - host.docker.internal:host-gateway
    restart: always

volumes:
  ollama: {}
  open-webui: {}
